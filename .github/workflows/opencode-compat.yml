name: OpenCode Compatibility

on:
  push:
    branches:
      - opencode-compat-validation
    paths:
      - '.aiox-core/infrastructure/scripts/validate-opencode-integration.js'
      - '.aiox-core/infrastructure/scripts/validate-opencode-compatibility.js'
      - '.aiox-core/infrastructure/scripts/opencode-doctor.js'
      - '.aiox-core/infrastructure/scripts/ide-sync/**'
      - '.github/workflows/opencode-compat.yml'
      - 'package.json'
      - 'package-lock.json'
      - '.gemini/commands/**'
      - '.claude/commands/**'
      - '.cursor/rules/**'
      - '.codex/**'
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'
  pull_request:
    branches:
      - main
    paths:
      - '.aiox-core/infrastructure/scripts/validate-opencode-integration.js'
      - '.aiox-core/infrastructure/scripts/validate-opencode-compatibility.js'
      - '.aiox-core/infrastructure/scripts/opencode-doctor.js'
      - '.aiox-core/infrastructure/scripts/ide-sync/**'
      - '.github/workflows/opencode-compat.yml'
      - 'package.json'
      - 'package-lock.json'
      - '.gemini/commands/**'
      - '.claude/commands/**'
      - '.cursor/rules/**'
      - '.codex/**'

permissions:
  contents: read

concurrency:
  group: opencode-compat-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  opencode-compat:
    name: OpenCode Compat (${{ matrix.os }}, Node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 12
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node: ['20', '22']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate OpenCode sync
        run: npm run validate:opencode-sync

      - name: Validate OpenCode integration
        run: npm run validate:opencode-integration

      - name: Upload validation summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: opencode-compat-${{ matrix.os }}-node-${{ matrix.node }}
          path: |
            package.json
            .aiox-core/infrastructure/scripts/validate-opencode-integration.js

  opencode-compat-summary:
    name: OpenCode Compat Summary
    runs-on: ubuntu-latest
    needs: [opencode-compat]
    if: always()
    steps:
      - name: Validate matrix result
        run: |
          echo "OpenCode compatibility matrix result: ${{ needs.opencode-compat.result }}"
          if [ "${{ needs.opencode-compat.result }}" != "success" ]; then
            echo "One or more OpenCode compatibility checks failed"
            exit 1
          fi
          echo "OpenCode compatibility checks passed on Linux and Windows"

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate observability summary
        run: npm run validate:integration -- --iterations 3 --retries 2 --json --output reports/opencode-observability-summary.json

      - name: Evaluate SLO alerts
        run: |
          node -e "const fs=require('fs'); const file='reports/opencode-observability-summary.json'; const summary=JSON.parse(fs.readFileSync(file,'utf8')); const active=(summary.alerts||[]).filter((a)=>a.status==='alert'); const critical=active.filter((a)=>a.severity==='critical'); console.log('Active alerts:', active.length); for (const alert of active) { console.log('-', alert.id, alert.severity, alert.message); } if (critical.length > 0) { process.exit(1); }"

      - name: Upload observability dashboard artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: opencode-observability-dashboard
          path: reports/opencode-observability-summary.json
